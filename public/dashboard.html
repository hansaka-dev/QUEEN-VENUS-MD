<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Queen Venus MD</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#030305;--cyan:#00f0ff;--purple:#8a2be2;--text:#f0f0f0;--muted:#8892b0;--glass:rgba(15,15,20,.4);--gb:rgba(255,255,255,.05);--gh:rgba(255,255,255,.1);--red:#ff4b2b;--green:#00f260}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;line-height:1.6}
    nav{display:flex;justify-content:space-between;align-items:center;padding:18px 7%;position:fixed;width:100%;top:0;z-index:1000;background:rgba(3,3,5,.75);backdrop-filter:blur(14px);border-bottom:1px solid var(--gb)}
    .logo{font-size:1.6rem;font-weight:700;font-family:'Space Grotesk',sans-serif;background:linear-gradient(45deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
    .nav-links{list-style:none;display:flex;gap:8px}
    .nav-links li a{color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;padding:8px 16px;border-radius:8px;transition:all .3s}
    .nav-links li a:hover,.nav-links li a.active{color:var(--text);background:var(--gh)}
    .nav-links li a.active{color:var(--cyan)}
    main{padding:120px 7% 50px;max-width:1200px;margin:0 auto}
    .grid{display:grid;grid-template-columns:1fr 1.5fr;gap:25px}
    .card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--gb);border-radius:20px;padding:25px;position:relative;overflow:hidden}
    .card-title{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;margin-bottom:20px;display:flex;align-items:center;gap:10px}
    .status-badge{padding:5px 12px;border-radius:20px;font-size:.8rem;font-weight:600;text-transform:uppercase}
    .status-online{background:rgba(0,242,96,.1);color:var(--green);border:1px solid rgba(0,242,96,.3)}
    .status-offline{background:rgba(255,75,43,.1);color:var(--red);border:1px solid rgba(255,75,43,.3)}
    .btn{padding:12px 25px;border-radius:10px;font-weight:600;cursor:pointer;transition:all .3s;border:none;display:inline-flex;align-items:center;gap:8px;font-size:.9rem}
    .btn-start{background:linear-gradient(45deg,#00f260,#0575E6);color:#fff}
    .btn-stop{background:linear-gradient(45deg,#ff4b2b,#ff416c);color:#fff}
    .btn-restart{background:var(--gh);color:var(--text);border:1px solid var(--gb)}
    .btn:hover{transform:translateY(-2px);filter:brightness(1.1)}
    textarea,input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--gb);border-radius:10px;color:var(--text);padding:12px;margin-bottom:15px;font-family:monospace;outline:none}
    textarea:focus,input:focus{border-color:var(--cyan)}
    .log-container{background:#000;border-radius:15px;padding:15px;height:450px;overflow-y:auto;font-family:'Consolas',monospace;font-size:.85rem;border:1px solid var(--gb)}
    .log-line{margin-bottom:5px;display:flex;gap:10px}
    .log-time{color:var(--muted);min-width:140px}
    .log-msg{word-break:break-all}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:20px}
    .stat-item{background:var(--gh);padding:15px;border-radius:12px;text-align:center}
    .stat-val{font-size:1.5rem;font-weight:700;color:var(--cyan);display:block}
    .stat-lab{font-size:.8rem;color:var(--muted)}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.nav-links{display:none}}
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">Queen Venus</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/dashboard" class="active">Dashboard</a></li>
      <li><a href="/settings">Settings</a></li>
      <li><a href="/plugins">Plugins</a></li>
    </ul>
  </nav>

  <main>
    <div class="grid">
      <!-- Control Panel -->
      <div class="card">
        <div class="card-title">🚀 Bot Control <span id="statusBadge" class="status-badge status-offline">Offline</span></div>
        <div id="botControls">
          <label style="display:block;margin-bottom:8px;font-size:.9rem;color:var(--muted)">Session ID</label>
          <textarea id="sessionIdInput" placeholder="Paste your Session ID here..." rows="4"></textarea>
          <div style="display:flex;gap:10px;margin-bottom:20px">
            <button onclick="saveSession()" class="btn btn-restart" style="flex:1">💾 Save</button>
            <button onclick="startBot()" id="startBtn" class="btn btn-start" style="flex:2">▶️ Start Bot</button>
            <button onclick="stopBot()" id="stopBtn" class="btn btn-stop" style="display:none;flex:2">🛑 Stop Bot</button>
          </div>
          <button onclick="restartBot()" class="btn btn-restart" style="width:100%">🔁 Restart System</button>
        </div>

        <div class="stat-grid">
          <div class="stat-item"><span class="stat-val" id="msgCount">0</span><span class="stat-lab">Messages</span></div>
          <div class="stat-item"><span class="stat-val" id="uptime">0m</span><span class="stat-lab">Uptime</span></div>
        </div>
        
        <div style="margin-top:20px">
          <a href="/pair" class="btn btn-restart" style="width:100%;justify-content:center;margin-bottom:10px">📱 Get New Session (Pair Code)</a>
          <a href="/qr" class="btn btn-restart" style="width:100%;justify-content:center">📷 Get New Session (QR Scan)</a>
        </div>
      </div>

      <!-- Live Logs -->
      <div class="card">
        <div class="card-title">📄 System Logs <button onclick="clearLogs()" style="margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem">Clear</button></div>
        <div class="log-container" id="logBox">
          <div class="log-line"><span class="log-time">[System]</span><span class="log-msg">Dashboard initialized. Ready.</span></div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const statusBadge = document.getElementById('statusBadge');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const logBox = document.getElementById('logBox');
    const msgCount = document.getElementById('msgCount');
    const uptime = document.getElementById('uptime');
    const sessInput = document.getElementById('sessionIdInput');

    // Fetch Initial Status & Config
    async function init() {
      const res = await fetch('/api/status');
      const { data } = await res.json();
      updateUI(data);

      const cfgRes = await fetch('/api/settings');
      const cfg = await cfgRes.json();
      sessInput.value = cfg.data.SESSION_ID || '';
    }

    function updateUI(status) {
      if (status.running) {
        statusBadge.className = 'status-badge status-online';
        statusBadge.innerText = 'Online';
        startBtn.style.display = 'none';
        stopBtn.style.display = 'inline-flex';
        msgCount.innerText = status.messagesHandled;
        if(status.connectedAt) {
          const diff = Math.floor((new Date() - new Date(status.connectedAt)) / 60000);
          uptime.innerText = diff + 'm';
        }
      } else {
        statusBadge.className = 'status-badge status-offline';
        statusBadge.innerText = 'Offline';
        startBtn.style.display = 'inline-flex';
        stopBtn.style.display = 'none';
      }
    }

    async function startBot() {
      addLog('System', 'Starting bot...');
      const saved = await saveSession();
      if (!saved) return;

      const res = await fetch('/api/bot/start', { method: 'POST' });
      const data = await res.json();
      if (!data.success) alert(data.message);
    }

    async function stopBot() {
      addLog('System', 'Stopping bot...');
      await fetch('/api/bot/stop', { method: 'POST' });
    }

    async function restartBot() {
      addLog('System', 'Restarting...');
      await fetch('/api/bot/restart', { method: 'POST' });
    }

    async function saveSession(notify = true) {
      const sessionValue = sessInput.value.trim();
      if (!sessionValue) {
        if (notify) alert('Please paste the Session ID before saving.');
        return false;
      }
      if (!sessionValue.includes('QUEEN VENUS =')) {
        if (notify) alert('Session ID should start with "QUEEN VENUS =".');
        return false;
      }

      const res = await fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ SESSION_ID: sessionValue })
      });
      const result = await res.json();
      if (result.success) {
        if (notify) alert('Session ID saved!');
        return true;
      }
      if (notify) alert('Failed to save Session ID.');
      return false;
    }

    function addLog(time, msg) {
      const div = document.createElement('div');
      div.className = 'log-line';
      div.innerHTML = `<span class="log-time">[${time}]</span><span class="log-msg">${msg}</span>`;
      logBox.appendChild(div);
      logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLogs() { logBox.innerHTML = ''; }

    // SSE for logs and status
    const evtSource = new EventSource("/api/logs");
    evtSource.onmessage = function(event) {
      const data = JSON.parse(event.data);
      addLog(new Date(data.time).toLocaleTimeString(), data.message);
    };

    // Heartbeat for status
    setInterval(async () => {
      const res = await fetch('/api/status');
      const { data } = await res.json();
      updateUI(data);
    }, 3000);

    init();
  </script>
</body>
</html>
