<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Scanner — Queen Venus MD</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&family=Cinzel:wght@600;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#030305;--cyan:#00f0ff;--purple:#8a2be2;--text:#f0f0f0;--muted:#8892b0;--glass:rgba(15,15,20,.4);--gb:rgba(255,255,255,.05);--gh:rgba(255,255,255,.1);--gold:#FFD700;--red:#ff4b2b}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
    .bg-fx{position:fixed;inset:0;z-index:-1;background:radial-gradient(circle at center, #2D1000 0%, #000 80%);opacity:.9}
    .card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--gb);border-radius:24px;padding:45px;width:100%;max-width:420px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.8)}
    h2{font-family:'Cinzel',serif;color:var(--gold);font-size:1.8rem;margin-bottom:8px;letter-spacing:1px;text-shadow:0 0 15px rgba(255,215,0,.3)}
    p{color:var(--muted);font-size:.9rem;margin-bottom:25px}
    .qr-wrapper{position:relative;padding:12px;background:rgba(255,255,255,.05);border-radius:20px;border:1px solid rgba(255,215,0,.2);margin-bottom:25px;width:240px;height:240px;margin-inline:auto;display:flex;justify-content:center;align-items:center;overflow:hidden}
    .qr-wrapper::before{content:'';position:absolute;inset:-50%;background:conic-gradient(transparent,transparent,transparent,var(--gold));animation:rotate 4s linear infinite;z-index:-1}
    .qr-wrapper::after{content:'';position:absolute;inset:4px;background:#000;border-radius:16px;z-index:-1}
    @keyframes rotate{100%{transform:rotate(360deg)}}
    #qrImage{width:100%;height:100%;border-radius:12px;object-fit:contain;background:#fff;padding:12px}
    progress{width:100%;height:8px;border-radius:4px;appearance:none;-webkit-appearance:none;background:rgba(255,255,255,.1);margin-bottom:25px}
    progress::-webkit-progress-bar{background:rgba(255,255,255,.1)}
    progress::-webkit-progress-value{background:linear-gradient(90deg,#B8860B,var(--gold));box-shadow:0 0 10px var(--gold);transition:width 1s linear}
    .btn-reload{padding:12px 35px;background:transparent;color:var(--gold);text-transform:uppercase;font-weight:700;letter-spacing:1px;border:1px solid var(--gold);border-radius:25px;cursor:pointer;transition:.3s;text-decoration:none;display:inline-block}
    .btn-reload:hover{background:var(--gold);color:#000;box-shadow:0 0 20px rgba(255,215,0,.5)}
    .back-nav{position:fixed;top:30px;left:30px;color:var(--muted);text-decoration:none;font-size:.9rem;display:flex;align-items:center;gap:8px}
    .back-nav:hover{color:var(--text)}
  </style>
</head>
<body>
  <div class="bg-fx"></div>
  <a href="/" class="back-nav">← Back to Home</a>

  <div class="card">
    <h2 id="titleText">SCAN QR CODE</h2>
    <p id="statusText">Link your device to Queen Venus MD</p>
    
    <div class="qr-wrapper">
      <img id="qrImage" src="/server" alt="QR CODE">
    </div>
    
    <progress value="0" max="30" id="progBar"></progress>
    
    <button onclick="location.reload()" class="btn-reload">Reload Page</button>
    
    <div style="margin-top:30px;font-size:.8rem;color:var(--muted)">
      <p>Scan with WhatsApp Linked Devices.<br>Check your WhatsApp for the Session ID.</p>
    </div>
  </div>

  <script>
    let timeLeft = 30;
    const pg = document.getElementById('progBar');
    const qr = document.getElementById('qrImage');
    const st = document.getElementById('statusText');
    const ti = document.getElementById('titleText');

    const timer = setInterval(() => {
      if (timeLeft <= 0) {
        clearInterval(timer);
        pg.value = 30;
        qr.style.opacity = "0.2";
        ti.innerText = "QR EXPIRED";
        ti.style.color = "var(--red)";
        st.innerText = "Please reload the page to get a new code.";
      } else {
        pg.value = 30 - timeLeft;
      }
      timeLeft--;
    }, 1000);
  </script>
</body>
</html>
